<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js"></script>
</head>
<body>
  <div id="app">

    <header id="header">
      <div id="header-left">
        <span id="brand">chat</span>
      </div>
      <div id="header-right">
        <span id="status-indicator">
          <span id="status-dot"></span>
          <span id="status-text">conectando…</span>
        </span>
      </div>
    </header>

    <main id="messages-wrap">
      <div id="messages-list"></div>
      <div id="empty-state">
        <p>Todavía no hay mensajes.<br/>Sé el primero en escribir.</p>
      </div>
    </main>

    <footer id="composer">
      <div id="composer-inner">
        <input
          id="name-input"
          type="text"
          placeholder="nombre"
          maxlength="30"
          autocomplete="off"
        />
        <div id="compose-row">
          <textarea
            id="msg-input"
            placeholder="escribe un mensaje…"
            maxlength="140"
            rows="1"
          ></textarea>
          <button id="send-btn" aria-label="Enviar">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14 8L2 2l3 6-3 6 12-6z" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <div id="char-bar">
          <span id="char-count">0 / 140</span>
        </div>
      </div>
    </footer>

  </div>

  <script src="chat.js"></script>
</body>
</html>
